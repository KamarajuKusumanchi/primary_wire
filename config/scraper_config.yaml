# config/scraper_config.yaml
#
# Defines which sources to scrape and how.
#
# Each group names the scraper module (under src/) to use.
# Each entry requires a 'slug' matching sources/sources.yaml.
# 'args' is an optional list of extra CLI flags passed verbatim to that scraper.
# --slug and --year are always passed automatically by scrape_all.py.
#
# 'args' also determines grouping for `scrape_all.py --smoke-test`: sources
# under the same scraper with identical 'args' are treated as interchangeable
# (one is picked at random to represent all of them), while a source with a
# distinct 'args' value -- even within the same group below, e.g. cdw's
# --fetch-detail-pages vs. costco/coinbase's --fallback-to-visible -- always
# gets its own representative, since it exercises a different code path.
#
# Note: per-source URL structure (e.g. news_releases_path) belongs in
# sources.yaml, not here as an 'args' override -- it's a durable fact about
# the source's site, not a per-run scraper behavior flag, and scripts run
# directly (outside scrape_all.py) still need to pick it up.

q4_ir:
  scraper: scrape_q4_ir
  sources:
    - slug: costco
      args: [--fallback-to-visible]
    - slug: cdw
      args: [--fetch-detail-pages]
    - slug: coinbase
      args: [--fallback-to-visible]

investorroom:
  scraper: scrape_investorroom
  sources:
    - slug: chipotle
    - slug: axon

notified:
  scraper: scrape_notified
  sources:
    - slug: abbvie
    - slug: amd
    - slug: apollo
    - slug: teradyne