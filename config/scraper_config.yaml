# config/scraper_config.yaml
#
# Defines which sources to scrape and how.
#
# Each group names the scraper module (under src/) to use.
# Each entry requires a 'slug' matching sources/sources.yaml.
# 'args' is an optional list of extra CLI flags passed verbatim to that scraper.
# --slug and --year are always passed automatically by scrape_all.py.
#
# 'args' also determines grouping for `scrape_all.py --smoke-test`: sources
# under the same scraper with identical 'args' are treated as interchangeable
# (one is picked at random to represent all of them), while a source with a
# distinct 'args' value gets its own representative, since it exercises a
# different code path. (TODO: cdw's need for detail-page-fetched dates no
# longer shows up here as an 'args' override -- see needs_detail_page_dates
# in sources.yaml -- so it currently groups with costco/coinbase for
# smoke-test purposes even though it exercises a different code path.
# Tracked as a separate follow-up.)
#
# Note: per-source URL structure (e.g. news_releases_path) and other durable
# facts about a source's site (e.g. needs_detail_page_dates) belong in
# sources.yaml, not here as an 'args' override -- they're durable facts about
# the source's site, not a per-run scraper behavior flag, and scripts run
# directly (outside scrape_all.py) still need to pick them up.

q4_ir:
  scraper: scrape_q4_ir
  sources:
    - slug: costco
      args: [--fallback-to-visible]
    - slug: cdw
    - slug: coinbase
      args: [--fallback-to-visible]

investorroom:
  scraper: scrape_investorroom
  sources:
    - slug: chipotle
    - slug: axon

notified:
  scraper: scrape_notified
  sources:
    - slug: abbvie
    - slug: amd
    - slug: apollo
    - slug: teradyne