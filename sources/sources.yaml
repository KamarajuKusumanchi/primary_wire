# primary_wire sources
# This is the master list of organizations tracked by primary_wire.
#
# Format:
#   slug:                short unique identifier used in CSV data files
#   name:                full display name of the organization
#   ticker:              stock ticker symbol (omit for non-public sources)
#   ir_url:               investor relations or official newsroom page
#   news_releases_path:  path appended to ir_url's host for the press-release
#                         listing page, e.g. "press-releases". Optional --
#                         omit to use the scraper's default ("news-releases").
#                         Only meaningful for scrape_investorroom.py and
#                         scrape_notified.py; other scrapers ignore it.
#   first_page_index:    the site's own starting page number for its ?page=
#                         pagination parameter. Optional -- omit to use the
#                         default (0). Only meaningful for
#                         scrape_notified.py; scrape_investorroom.py paginates
#                         by item offset (?o=), which has no equivalent
#                         starting-index quirk, and other scrapers ignore it.
#   notes:                any useful context about finding press releases
#   needs_detail_page_dates: true if this source's Q4 IR listing page does not
#                         embed a publish date in its news cards, so scrape_q4_ir.py
#                         must fetch each item's individual detail page to find one
#                         (equivalent to always passing --fetch-detail-pages).
#                         Optional -- omit to use the default (false). Only
#                         meaningful for scrape_q4_ir.py; other scrapers ignore it.
#                         This is a durable fact about the site's Q4 theme, not a
#                         per-run behavior choice, so it lives here rather than as
#                         an 'args' override in config/scraper_config.yaml.

